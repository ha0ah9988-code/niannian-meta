# niannian-meta 配置
# 内核启动时加载此文件

llm:
  # LLM 提供商配置
  # 如果不设，依次尝试环境变量 LLM_API_KEY / OPENAI_API_KEY
  api_key: ""  # 留空则从环境变量读取
  base_url: "https://opencode.ai/zen/go/v1"
  model: "deepseek-v4-flash"

memory:
  l1_max_lines: 30       # L1 行数硬约束
  auto_crystallize: true # 每 N 轮自动结晶
  crystallize_interval: 5

kernel:
  max_tool_rounds: 20    # 单轮最大工具调用次数
  history_size: 20       # 保留最近 N 轮会话历史

compression:
  # 上下文自动压缩（基于 Hermes context_compressor）
  enabled: true
  threshold_percent: 0.75    # 上下文用量超过 75% 时触发
  protect_first_n: 3         # 保护前 N 条非 system 消息
  protect_last_n: 8          # 保护后 N 条消息
  context_length: 128000     # 模型上下文窗口大小
  summary_max_tokens: 8000   # 摘要最大 token 数

state:
  # state.db 持久化存储
  source: "standalone"       # 会话来源标识
  # 外部压缩脚本（可选）
  # session_trim_script: "~/niannian/repo/shared/tools/session-trim-v2.py"
